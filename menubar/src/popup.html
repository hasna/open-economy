<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: transparent;
      color: #1d1d1f;
      -webkit-app-region: no-drag;
      overflow: hidden;
    }
    .container {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      border-radius: 14px;
      margin: 6px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.06);
    }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .header h1 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #86868b; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #34c759; display: inline-block; }
    .sync-dot.stale { background: #ff9f0a; }
    .today-cost { font-size: 42px; font-weight: 700; letter-spacing: -1.5px; color: #1d1d1f; margin: 2px 0 4px; }
    .today-label { font-size: 12px; color: #86868b; font-weight: 500; margin-bottom: 16px; }
    .stats-row { display: flex; gap: 12px; margin-bottom: 18px; }
    .stat-box { flex: 1; background: rgba(0,0,0,0.03); border-radius: 10px; padding: 10px 12px; }
    .stat-box .value { font-size: 18px; font-weight: 700; color: #1d1d1f; }
    .stat-box .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #86868b; margin-top: 2px; }
    .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #86868b; margin-bottom: 8px; }
    .projects-list { margin-bottom: 16px; }
    .project-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .project-row:last-child { border-bottom: none; }
    .project-name { font-size: 13px; font-weight: 500; color: #1d1d1f; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-cost { font-size: 13px; font-weight: 600; color: #1d1d1f; font-variant-numeric: tabular-nums; }
    .sync-info { font-size: 11px; color: #86868b; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .actions { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #007aff; color: white; }
    .btn-secondary { background: rgba(0,0,0,0.05); color: #1d1d1f; }
    .btn-quit { width: 100%; padding: 8px; background: none; border: none; color: #86868b; font-size: 12px; cursor: pointer; margin-top: 10px; font-family: inherit; }
    .btn-quit:hover { color: #ff3b30; }
    .empty { font-size: 12px; color: #aeaeb2; font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Economy</h1>
      <span class="sync-dot" id="syncDot"></span>
    </div>
    <div class="today-cost" id="todayCost">$0.00</div>
    <div class="today-label">today</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="value" id="weekCost">$0.00</div>
        <div class="label">This Week</div>
      </div>
      <div class="stat-box">
        <div class="value" id="monthCost">$0.00</div>
        <div class="label">This Month</div>
      </div>
    </div>

    <div class="section-title">Top Projects</div>
    <div class="projects-list" id="projectsList">
      <div class="empty">Syncing...</div>
    </div>

    <div class="sync-info">
      <span class="sync-dot" id="syncDot2"></span>
      <span id="syncTime">Syncing...</span>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnSync">Sync Now</button>
      <button class="btn btn-secondary" id="btnDashboard">Dashboard</button>
    </div>
    <button class="btn-quit" id="btnQuit">Quit</button>
  </div>

  <script>
    function fmtUsd(n) {
      if (n == null) return '$0.00';
      if (n >= 0.01) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return '$' + n.toFixed(4);
    }

    function updateUI(stats) {
      document.getElementById('todayCost').textContent = fmtUsd(stats.today);
      document.getElementById('weekCost').textContent = fmtUsd(stats.week);
      document.getElementById('monthCost').textContent = fmtUsd(stats.month);

      const syncDot = document.getElementById('syncDot');
      const syncDot2 = document.getElementById('syncDot2');
      const syncTime = document.getElementById('syncTime');
      if (stats.lastSync) {
        syncDot.className = 'sync-dot';
        syncDot2.className = 'sync-dot';
        syncTime.textContent = 'Last sync: ' + stats.lastSync;
      } else {
        syncDot.className = 'sync-dot stale';
        syncDot2.className = 'sync-dot stale';
        syncTime.textContent = 'Not synced yet';
      }

      const list = document.getElementById('projectsList');
      if (stats.topProjects && stats.topProjects.length > 0) {
        list.innerHTML = stats.topProjects.map(p =>
          '<div class="project-row">' +
            '<span class="project-name">' + (p.project_name || '\u2014') + '</span>' +
            '<span class="project-cost">' + fmtUsd(p.cost_usd) + '</span>' +
          '</div>'
        ).join('');
      } else {
        list.innerHTML = '<div class="empty">No projects tracked yet</div>';
      }
    }

    window.economy.onStats((stats) => updateUI(stats));

    document.getElementById('btnSync').addEventListener('click', async () => {
      document.getElementById('btnSync').textContent = 'Syncing...';
      const stats = await window.economy.syncNow();
      document.getElementById('btnSync').textContent = 'Sync Now';
      if (stats) updateUI(stats);
    });

    document.getElementById('btnDashboard').addEventListener('click', () => {
      window.economy.openDashboard();
    });

    document.getElementById('btnQuit').addEventListener('click', () => {
      window.economy.quit();
    });
  </script>
</body>
</html>
